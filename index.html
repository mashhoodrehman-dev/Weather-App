<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parentContainer">
    <div class="searchContainer">
        <input type="text" class="cityInput" name="cityInput" placeholder="Enter City Name" id="cityInput">
        <button id="searchBtn" class="searchBtn">Search</button>
    </div>    
    
     <div id="weather" class="weatherCard">
        <h2 id="cityName"></h2>
        <p id="temp"></p>
        <p id="description"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
